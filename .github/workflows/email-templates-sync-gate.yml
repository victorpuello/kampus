name: Email Templates Sync Gate

on:
  pull_request:
    paths:
      - 'backend/communications/**'
      - 'kampus_frontend/email-templates/**'
      - 'kampus_frontend/package.json'
      - 'kampus_frontend/package-lock.json'
      - '.github/workflows/email-templates-sync-gate.yml'
  workflow_dispatch:

jobs:
  templates-gate:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: ci-email-templates-secret-key-abcdefghijklmnopqrstuvwxyz
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      KAMPUS_BACKEND_BASE_URL: http://localhost:8000
      KAMPUS_FRONTEND_BASE_URL: http://localhost:5173
      KAMPUS_PUBLIC_SITE_URL: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: kampus_frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: kampus_frontend
        run: npm ci

      - name: Build React Email artifact
        working-directory: kampus_frontend
        run: npm run build:emails

      - name: Verify templates artifact has no drift
        run: git diff --exit-code -- kampus_frontend/email-templates/dist/templates.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply migrations for sync validation
        run: python backend/manage.py migrate --noinput

      - name: Validate sync in dry-run mode
        run: python backend/manage.py sync_email_templates_from_artifact --dry-run
