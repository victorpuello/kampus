services:
  backend:
    environment:
      - DJANGO_ENV=production
      - DJANGO_DEBUG=false
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DJANGO_SECURE_SSL_REDIRECT=true
      - DJANGO_SESSION_COOKIE_SECURE=true
      - DJANGO_CSRF_COOKIE_SECURE=true
      - DJANGO_SECURE_HSTS_SECONDS=${DJANGO_SECURE_HSTS_SECONDS:-31536000}
      - DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS=true
      - DJANGO_SECURE_HSTS_PRELOAD=true
      - KAMPUS_CREATE_SUPERUSER=false
      - KAMPUS_RUN_MIGRATIONS=true

  backend_worker:
    environment:
      - DJANGO_ENV=production
      - DJANGO_DEBUG=false
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - KAMPUS_CREATE_SUPERUSER=false
      - KAMPUS_RUN_MIGRATIONS=false
      - KAMPUS_NOTIFICATIONS_ALERT_MAX_FAILED=${KAMPUS_NOTIFICATIONS_ALERT_MAX_FAILED:-10}
      - KAMPUS_NOTIFICATIONS_ALERT_MAX_SUPPRESSED=${KAMPUS_NOTIFICATIONS_ALERT_MAX_SUPPRESSED:-50}
      - KAMPUS_NOTIFICATIONS_ALERT_MIN_SUCCESS_RATE=${KAMPUS_NOTIFICATIONS_ALERT_MIN_SUCCESS_RATE:-90.0}
      - KAMPUS_NOTIFICATIONS_ALERT_FAIL_ON_BREACH=${KAMPUS_NOTIFICATIONS_ALERT_FAIL_ON_BREACH:-true}
      - KAMPUS_NOTIFICATIONS_ALERT_NOTIFY_ADMINS=${KAMPUS_NOTIFICATIONS_ALERT_NOTIFY_ADMINS:-true}

  backend_scheduler:
    environment:
      - DJANGO_ENV=production
      - DJANGO_DEBUG=false
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - KAMPUS_CREATE_SUPERUSER=false
      - KAMPUS_RUN_MIGRATIONS=false
      - KAMPUS_NOVELTIES_SLA_LOOP_ENABLED=false
      - KAMPUS_NOVELTIES_SLA_DEDUPE_WITHIN_SECONDS=90000
      - KAMPUS_NOTIFICATIONS_HEALTH_LOOP_ENABLED=false

  backend_beat:
    environment:
      - DJANGO_ENV=production
      - DJANGO_DEBUG=false
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - KAMPUS_CREATE_SUPERUSER=false
      - KAMPUS_RUN_MIGRATIONS=false
      - KAMPUS_NOVELTIES_SLA_NOTIFY_BEAT_ENABLED=true
      - KAMPUS_NOVELTIES_SLA_NOTIFY_BEAT_MINUTE=${KAMPUS_NOVELTIES_SLA_NOTIFY_BEAT_MINUTE:-0}
      - KAMPUS_NOVELTIES_SLA_NOTIFY_BEAT_HOUR=${KAMPUS_NOVELTIES_SLA_NOTIFY_BEAT_HOUR:-8}
      - KAMPUS_NOVELTIES_SLA_NOTIFY_BEAT_DAY_OF_WEEK=${KAMPUS_NOVELTIES_SLA_NOTIFY_BEAT_DAY_OF_WEEK:-1-5}
      - KAMPUS_NOTIFICATIONS_HEALTH_BEAT_ENABLED=true
      - KAMPUS_NOTIFICATIONS_HEALTH_BEAT_MINUTE=${KAMPUS_NOTIFICATIONS_HEALTH_BEAT_MINUTE:-15}
      - KAMPUS_NOTIFICATIONS_HEALTH_BEAT_HOUR=${KAMPUS_NOTIFICATIONS_HEALTH_BEAT_HOUR:-*}
      - KAMPUS_NOTIFICATIONS_HEALTH_BEAT_DAY_OF_WEEK=${KAMPUS_NOTIFICATIONS_HEALTH_BEAT_DAY_OF_WEEK:-1-5}
      - KAMPUS_PLANNING_REMINDER_ENABLED=${KAMPUS_PLANNING_REMINDER_ENABLED:-true}
      - KAMPUS_PLANNING_REMINDER_BEAT_ENABLED=${KAMPUS_PLANNING_REMINDER_BEAT_ENABLED:-true}
      - KAMPUS_PLANNING_REMINDER_BEAT_MINUTE=${KAMPUS_PLANNING_REMINDER_BEAT_MINUTE:-0}
      - KAMPUS_PLANNING_REMINDER_BEAT_HOUR=${KAMPUS_PLANNING_REMINDER_BEAT_HOUR:-7}
      - KAMPUS_PLANNING_REMINDER_BEAT_DAY_OF_WEEK=${KAMPUS_PLANNING_REMINDER_BEAT_DAY_OF_WEEK:-1-5}
      - KAMPUS_PLANNING_REMINDER_DEDUPE_SECONDS=${KAMPUS_PLANNING_REMINDER_DEDUPE_SECONDS:-86400}
